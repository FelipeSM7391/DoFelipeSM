<!DOCTYPE html>
<html lang="en"><!--linguagem-->
<head>              <!--caracter-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <!--icone da pagina-->
    <link rel="icon" href="./favicons/favicon-16asdasdx16.png">

                                <!--linka com o css-->
    <link rel="stylesheet" href="./css/style.css">

    <script defer src="./js/script.js"></script>

    <title>Pokédex_FSM</title>
</head>
<body>

    <main>
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/6.gif" alt="pokemon" class="pokemon_image">


        <h1 class="pokemon_data">   
            <span class="pokemon_num">6</span> -
            <span class="pokemon_name">charizard</span>
        </h1>


        <form class="form">
            <input 
            type="search"
            class="input_search"
            placeholder="Name or Pokémon number"
            required
            />
        </form> 


        <div class="buttons">
            <button class="button btn-prev">&lt; Prev </button>
            <button class="button btn-next">Next &gt;</button>
        </div>

                    <!--imagem-->               <!--narrador-->       <!--css p/editar cor estrutura-->
        <img src="./images/pokedex.png" alt="pokedex" class="pokedex">

    </main>
</body>
</html>
